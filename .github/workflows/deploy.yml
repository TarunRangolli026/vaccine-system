name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/vaccine-system
            git pull origin main

            cd ~/vaccine-system/server
            npm install
            pm2 restart vaccine-backend --update-env

            cd ~/vaccine-system/client
            npm install
            pm2 restart vaccine-frontend
